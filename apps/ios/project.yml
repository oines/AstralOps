name: AstralOpsIOS
options:
  bundleIdPrefix: dev.oines
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  AstralOpsIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Sources/AstralOpsIOSKit
      - path: Resources
    dependencies:
      - framework: Frameworks/Mobilecore.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.oines.astralops.ios
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
  AstralOpsIOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/AstralOpsIOSTests
    dependencies:
      - target: AstralOpsIOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
