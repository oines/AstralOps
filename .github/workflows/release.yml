name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  plan:
    name: Plan Release
    runs-on: ubuntu-latest

    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      previous_tag: ${{ steps.plan.outputs.previous_tag }}
      bump: ${{ steps.plan.outputs.bump }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Plan release
        id: plan
        run: node scripts/release-plan.mjs

  check:
    name: Check
    needs: plan
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  package:
    name: Package Desktop (${{ matrix.name }})
    needs:
      - plan
      - check
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Sync package versions
        run: node scripts/set-release-version.mjs "${{ needs.plan.outputs.version }}"

      - name: Package desktop app
        env:
          ASTRALOPS_VERSION: ${{ needs.plan.outputs.version }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run package:desktop

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          if-no-files-found: error
          path: |
            release/desktop/out/*/AstralOps-*.dmg
            release/desktop/out/*/AstralOps-*.zip
            release/desktop/out/*/AstralOps-*.AppImage
            release/desktop/out/*/AstralOps-*.deb
            release/desktop/out/*/AstralOps-*.exe
            release/desktop/out/*/AstralOps-*.blockmap
            release/desktop/out/*/latest*.yml

  publish:
    name: Publish Release
    needs:
      - plan
      - package
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          find release-artifacts -type f | sort
          cd release-artifacts
          find . -type f \
            \( -name 'AstralOps-*.dmg' -o -name 'AstralOps-*.zip' -o -name 'AstralOps-*.AppImage' -o -name 'AstralOps-*.deb' -o -name 'AstralOps-*.exe' -o -name 'AstralOps-*.blockmap' -o -name 'latest*.yml' \) \
            -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          test -s SHA256SUMS.txt

      - name: Create tag
        env:
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "$TAG")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "::error::Tag $TAG already exists on $tag_commit, not $head_commit"
              exit 1
            fi
            echo "Tag $TAG already exists on this commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping publish."
            exit 0
          fi
          mapfile -t assets < <(find release-artifacts -type f \
            \( -name 'AstralOps-*.dmg' -o -name 'AstralOps-*.zip' -o -name 'AstralOps-*.AppImage' -o -name 'AstralOps-*.deb' -o -name 'AstralOps-*.exe' -o -name 'AstralOps-*.blockmap' -o -name 'latest*.yml' -o -name 'SHA256SUMS.txt' \) \
            | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi
          gh release create "$TAG" "${assets[@]}" --title "$TAG" --generate-notes --verify-tag
